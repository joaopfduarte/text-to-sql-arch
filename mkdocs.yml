site_name: Arquitetura MCP para Text-to-SQL Orientado a Metadados
site_description: Interfaces Conversacionais Confiáveis — arquitetura e engenharia Text-to-SQL com MCP e Apache Atlas
site_url: https://example.com/
repo_url: https://gitlab.com/joaopedrofduarte-studien/back-end-practice/tcc/documentation
repo_name: GitLab
edit_uri: edit/main/docs/
strict: true

extra_css:
  - stylesheets/diagrams.css

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.view

plugins:
  - search
  - social
  - tags
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: zoom
      width: 95vw
      height: auto
      zoomable: true
      draggable: true
      auto_themed: true
      auto_caption: true
      caption_position: bottom
      shadow: true

nav:
  - Início: index.md
  - Leitura rápida: 00-leitura-rapida.md
  - Produto e escopo: 01-produto-e-escopo.md
  - Arquitetura de negócio: 02-arquitetura-negocio.md
  - Arquitetura de aplicação:
    - Visão lógica: 03-arquitetura-aplicacao/visao-logica.md
    - Camadas MCP: 03-arquitetura-aplicacao/camadas-mcp.md
    - Modelo de domínio: 03-arquitetura-aplicacao/modelo-dominio.md
  - Arquitetura de dados:
    - Banco laboratorial: 04-arquitetura-dados/banco-laboratorio-dominio.md
    - Schema massa de teste: 04-arquitetura-dados/schema-massa-teste.md
    - Catálogo Atlas: 04-arquitetura-dados/catalogo-atlas.md
    - Carga no cluster: 04-arquitetura-dados/carga-cluster-laboratorio.md
  - Infraestrutura:
    - Visão AWS: 05-infraestrutura/visao-aws.md
    - Cluster Hadoop: 05-infraestrutura/cluster-hadoop.md
    - Delta legado para AWS: 05-infraestrutura/delta-oci-para-aws.md
    - VDF ODP x86: 05-infraestrutura/vdf-odp-x86.md
  - Implementação Java:
    - Módulos Spring: 06-implementacao-java/modulos-spring.md
    - Ports e adapters: 06-implementacao-java/ports-adapters.md
  - Contratos MCP: 07-contratos-mcp/contracts-v1.md
  - Experimento e avaliação:
    - Protocolo: 08-experimento-avaliacao/protocolo-avaliacao.md
    - Inferência e prompts: 08-experimento-avaliacao/llm-inferencia-e-prompts.md
    - Métricas e fórmulas: 08-experimento-avaliacao/metricas-formulas.md
    - Runbook reprodutibilidade: 08-experimento-avaliacao/runbook-reprodutibilidade.md
  - Operação: 09-operacao.md
  - Rastreabilidade acadêmica: 10-rastreabilidade-academica.md
  - Roadmap: roadmap-5a6-meses.md
  - Evidências experimentais:
    - Índice: evidence/README.md
    - Gabarito da bateria: evidence/gabarito-bateria-v1.md
    - Matriz de cobertura: evidence/matriz-cobertura-bateria-v1.md
    - Matriz 15 tools MCP: evidence/matriz-15-tools-mcp-v1.md
    - Inventário Atlas API: evidence/inventario-atlas-api-para-mcp.md
  - ADRs:
    - Índice: adr/README.md
    - ADR-0001 Fundação: adr/ADR-0001-fundacao-arquitetural.md
    - ADR-0002 Topologia AWS: adr/ADR-0002-topologia-aws-cluster-minimo.md
    - ADR-0003 Inferência LLM: adr/ADR-0003-inferencia-llm-deterministica.md

markdown_extensions:
  - meta
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
