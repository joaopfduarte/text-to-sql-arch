site_name: Arquitetura MCP para Text-to-SQL Orientado a Metadados
site_description: Interfaces Conversacionais Confiáveis — arquitetura e engenharia Text-to-SQL com MCP e Apache Atlas
site_url: https://joaopfduarte.github.io/text-to-sql-arch/
repo_name: joaopfduarte/text-to-sql-arch
repo_url: https://github.com/joaopfduarte/text-to-sql-arch
edit_uri: edit/main/docs/
strict: true

extra:
  nav_title: Home

extra_css:
  - stylesheets/diagrams.css
  - stylesheets/dark-contrast.css
  - assets/css/style.css

extra_javascript:
  - assets/js/bundle.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.footnote.tooltips
    - content.action.view

plugins:
  - search
  - social
  - tags
  - redirects:
      redirect_maps:
        '00-leitura-rapida.md': 'guias/leitura-rapida.md'
        '00-glossario-anonimizacao.md': 'guias/leitura-rapida.md'
        '01-produto-e-escopo.md': 'produto/escopo.md'
        '02-arquitetura-negocio.md': 'arquitetura/negocio.md'
        '03-arquitetura-aplicacao/visao-logica.md': 'arquitetura/aplicacao/visao-logica.md'
        '03-arquitetura-aplicacao/camadas-mcp.md': 'arquitetura/aplicacao/camadas-mcp.md'
        '03-arquitetura-aplicacao/modelo-dominio.md': 'arquitetura/aplicacao/modelo-dominio.md'
        '04-arquitetura-dados/banco-laboratorio-dominio.md': 'arquitetura/dados/banco-laboratorio-dominio.md'
        '04-arquitetura-dados/schema-massa-teste.md': 'arquitetura/dados/schema-massa-teste.md'
        '04-arquitetura-dados/catalogo-atlas.md': 'arquitetura/dados/catalogo-atlas.md'
        '04-arquitetura-dados/carga-cluster-laboratorio.md': 'arquitetura/dados/carga-cluster-laboratorio.md'
        '05-infraestrutura/visao-aws.md': 'infraestrutura/visao-aws.md'
        '05-infraestrutura/cluster-hadoop.md': 'infraestrutura/cluster-hadoop.md'
        '05-infraestrutura/delta-oci-para-aws.md': 'infraestrutura/visao-aws.md'
        'infraestrutura/delta-oci-para-aws.md': 'infraestrutura/visao-aws.md'
        '05-infraestrutura/vdf-odp-x86.md': 'infraestrutura/vdf-odp-x86.md'
        '06-implementacao-java/modulos-spring.md': 'implementacao/modulos-spring.md'
        '06-implementacao-java/ports-adapters.md': 'implementacao/ports-adapters.md'
        '07-contratos-mcp/contracts-v1.md': 'arquitetura/contratos-mcp/contracts-v1.md'
        '08-experimento-avaliacao/protocolo-avaliacao.md': 'experimento/protocolo-avaliacao.md'
        '08-experimento-avaliacao/llm-inferencia-e-prompts.md': 'experimento/llm-inferencia-e-prompts.md'
        '08-experimento-avaliacao/metricas-formulas.md': 'experimento/metricas-formulas.md'
        '08-experimento-avaliacao/runbook-reprodutibilidade.md': 'experimento/runbook-reprodutibilidade.md'
        '09-operacao.md': 'operacao/index.md'
        '10-rastreabilidade-academica.md': 'pesquisa/rastreabilidade-academica.md'
        'roadmap-5a6-meses.md': 'pesquisa/roadmap.md'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: zoom
      width: 95vw
      height: auto
      zoomable: true
      draggable: true
      auto_themed: true
      auto_caption: true
      caption_position: bottom
      shadow: true

nav:
  - Início: index.md
  - Guias:
    - Leitura rápida: guias/leitura-rapida.md
  - Produto e escopo: produto/escopo.md
  - Arquitetura:
    - Arquitetura de negócio: arquitetura/negocio.md
    - Aplicação:
      - Visão lógica: arquitetura/aplicacao/visao-logica.md
      - Camadas MCP: arquitetura/aplicacao/camadas-mcp.md
      - Modelo de domínio: arquitetura/aplicacao/modelo-dominio.md
    - Dados:
      - Banco laboratorial: arquitetura/dados/banco-laboratorio-dominio.md
      - Schema massa de teste: arquitetura/dados/schema-massa-teste.md
      - Catálogo Atlas: arquitetura/dados/catalogo-atlas.md
      - Carga no cluster: arquitetura/dados/carga-cluster-laboratorio.md
    - Contratos MCP: arquitetura/contratos-mcp/contracts-v1.md
  - Infraestrutura:
    - Visão AWS: infraestrutura/visao-aws.md
    - Cluster Hadoop: infraestrutura/cluster-hadoop.md
    - VDF ODP x86: infraestrutura/vdf-odp-x86.md
  - Implementação Java:
    - Módulos Spring: implementacao/modulos-spring.md
    - Ports e adapters: implementacao/ports-adapters.md
  - Experimento e avaliação:
    - Protocolo: experimento/protocolo-avaliacao.md
    - Inferência e prompts: experimento/llm-inferencia-e-prompts.md
    - Métricas e fórmulas: experimento/metricas-formulas.md
    - Runbook reprodutibilidade: experimento/runbook-reprodutibilidade.md
  - Operação: operacao/index.md
  - Pesquisa:
    - Rastreabilidade acadêmica: pesquisa/rastreabilidade-academica.md
    - Roadmap: pesquisa/roadmap.md
  - Evidências experimentais:
    - Índice: evidence/README.md
    - Gabarito da bateria: evidence/gabarito-bateria-v1.md
    - Matriz de cobertura: evidence/matriz-cobertura-bateria-v1.md
    - Matriz 15 tools MCP: evidence/matriz-15-tools-mcp-v1.md
    - Inventário Atlas API: evidence/inventario-atlas-api-para-mcp.md
  - ADRs:
    - Índice: adr/README.md
    - ADR-0001 Fundação: adr/ADR-0001-fundacao-arquitetural.md
    - ADR-0002 Topologia AWS: adr/ADR-0002-topologia-aws-cluster-minimo.md
    - ADR-0003 Inferência LLM: adr/ADR-0003-inferencia-llm-deterministica.md

markdown_extensions:
  - meta
  - abbr
  - footnotes
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
