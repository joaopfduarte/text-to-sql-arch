site_name: Arquitetura e Engenharia do Produto TCC
site_description: Documentação operacional Text-to-SQL com MCP e Apache Atlas
site_url: https://example.com/
strict: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - social

nav:
  - Início: index.md
  - Leitura rápida: 00-leitura-rapida.md
  - Produto e escopo: 01-produto-e-escopo.md
  - Arquitetura de negócio: 02-arquitetura-negocio.md
  - Arquitetura de aplicação:
    - Visão lógica: 03-arquitetura-aplicacao/visao-logica.md
    - Camadas MCP: 03-arquitetura-aplicacao/camadas-mcp.md
    - Modelo de domínio: 03-arquitetura-aplicacao/modelo-dominio.md
  - Arquitetura de dados:
    - Banco XPTO (domínio): 04-arquitetura-dados/banco-xpto-dominio.md
    - Schema massa de teste: 04-arquitetura-dados/schema-massa-teste.md
    - Catálogo Atlas: 04-arquitetura-dados/catalogo-atlas.md
    - Carga no cluster: 04-arquitetura-dados/carga-cluster-xpto.md
  - Infraestrutura:
    - Visão AWS: 05-infraestrutura/visao-aws.md
    - Cluster Hadoop: 05-infraestrutura/cluster-hadoop.md
    - Delta OCI para AWS: 05-infraestrutura/delta-oci-para-aws.md
    - VDF ODP x86: 05-infraestrutura/vdf-odp-x86.md
  - Implementação Java:
    - Módulos Spring: 06-implementacao-java/modulos-spring.md
    - Ports e adapters: 06-implementacao-java/ports-adapters.md
  - Contratos MCP: 07-contratos-mcp/contracts-v1.md
  - Experimento e avaliação:
    - Protocolo: 08-experimento-avaliacao/protocolo-avaliacao.md
    - Runbook reprodutibilidade: 08-experimento-avaliacao/runbook-reprodutibilidade.md
  - Operação: 09-operacao.md
  - Rastreabilidade acadêmica: 10-rastreabilidade-academica.md
  - Roadmap: roadmap-5a6-meses.md
  - ADRs:
    - Índice: adr/README.md
    - ADR-0001 Fundação: adr/ADR-0001-fundacao-arquitetural.md
    - ADR-0002 Topologia AWS: adr/ADR-0002-topologia-aws-cluster-minimo.md
  - Monografia: monografia.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
