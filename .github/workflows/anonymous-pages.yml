name: Anonymous Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: anonymous-pages
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build Web Components
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependências de sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            shared-mime-info plantuml graphviz default-jre-headless ripgrep
          sudo rm -rf /var/lib/apt/lists/*

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Validar anonimização
        run: bash scripts/check-anonymization.sh

      - name: Validar PT-BR
        run: bash scripts/check-pt-br.sh

      - name: Validar docs/assets
        run: bash scripts/check-docs-assets.sh

      - name: Preparar documentação
        run: bash scripts/prepare-docs.sh

      - name: Build MkDocs anonimizado
        run: mkdocs build --strict -f mkdocs.anonymous.yml --site-dir public-anonymous

      - name: Validar build anonimizado
        run: bash scripts/check-anonymous-build.sh public-anonymous

      - name: Publicar branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: public-anonymous
          force_orphan: true

      - name: Checklist pós-publicação
        run: |
          cat <<'EOF'
          Anonymous Pages publicado em gh-pages.

          Próximos passos manuais:
            1. Settings → Pages → Deploy from a branch → gh-pages / (root)
            2. anonymous.4open.science → Anonymize → branch gh-pages
            3. Ativar "Github page" e informar termos de anonimização

          Após aceitação: Settings → Pages → GitHub Actions
          EOF
