name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build Web Components
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependências de sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 \
            shared-mime-info plantuml graphviz default-jre-headless ripgrep
          sudo rm -rf /var/lib/apt/lists/*

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Validar anonimização
        run: bash scripts/check-anonymization.sh

      - name: Validar PT-BR
        run: bash scripts/check-pt-br.sh

      - name: Validar docs/assets
        run: bash scripts/check-docs-assets.sh

      - name: Validar links da documentação
        run: bash scripts/check-doc-links.sh

      - name: Preparar documentação
        run: bash scripts/prepare-docs.sh

      - name: Build MkDocs
        run: mkdocs build --strict --site-dir public

      - name: Upload artifact para GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
