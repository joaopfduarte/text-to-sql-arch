stages:
  - build
  - deploy

build:components:
  stage: build
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run typecheck
    - npm run build
  artifacts:
    paths:
      - docs/assets/js/bundle.js
      - docs/assets/css/style.css
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# CairoSVG (plugin social) exige libcairo no sistema; python:3.12-slim não inclui.
pages:
  stage: deploy
  image: python:3.12-slim
  needs:
    - build:components
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info plantuml graphviz default-jre-headless ripgrep
    - rm -rf /var/lib/apt/lists/*
  script:
    - pip install -r requirements.txt
    - bash scripts/check-anonymization.sh
    - bash scripts/check-pt-br.sh
    - bash scripts/check-docs-assets.sh
    - bash scripts/check-doc-links.sh
    - bash scripts/prepare-docs.sh
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
