image: python:3.12-slim

# CairoSVG (plugin social) exige libcairo no sistema; python:3.12-slim não inclui.
pages:
  stage: deploy
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq --no-install-recommends libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info plantuml default-jre-headless
    - rm -rf /var/lib/apt/lists/*
  script:
    - pip install -r requirements.txt
    - test -f docs/monografia.pdf || (echo "docs/monografia.pdf em falta — adicione o PDF da monografia" && exit 1)
    - bash scripts/prepare-docs.sh
    - mkdocs build --strict --site-dir public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
